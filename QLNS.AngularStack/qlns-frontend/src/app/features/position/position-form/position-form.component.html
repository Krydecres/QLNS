<div class="dashboard">
    <div class="dashboard-header">
        <div>
            <h1 class="dashboard-title">{{ isEditMode ? 'Chỉnh sửa chức vụ' : 'Thêm mới chức vụ' }}</h1>
            <p class="dashboard-subtitle">{{ isEditMode ? 'Cập nhật thông tin chức vụ' : 'Tạo mới thông tin một chức vụ trên hệ thống' }}</p>
        </div>
    </div>

    <div class="row mt-3">
        <div class="col-md-6">
            <div class="chart-card">
                <form [formGroup]="positionForm" (ngSubmit)="onSubmit()">
                    <div class="mb-3">
                        <label for="name" class="form-label fw-bold">Tên chức vụ</label>
                        <input type="text" id="name" formControlName="name" class="form-control" placeholder="Ví dụ: Giám đốc, Trưởng phòng..." />
                        <span *ngIf="positionForm.get('name')?.invalid && positionForm.get('name')?.touched" class="text-danger mt-1 d-block">
                            Tên chức vụ không được để trống
                        </span>
                    </div>
                    
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary" [disabled]="positionForm.invalid">
                            <i class="bi bi-save"></i> Lưu dữ liệu
                        </button>
                        <a routerLink="/positions" class="btn btn-light border">
                            <i class="bi bi-x-circle"></i> Hủy bỏ
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
