<div class="d-flex justify-content-center align-items-center mt-5">
    <div class="card shadow border-0 rounded-4" style="max-width: 450px; width: 100%;">
        <div class="card-header bg-primary text-white text-center py-4 rounded-top-4">
            <h3 class="mb-0 fw-bold"><i class="bi bi-box-arrow-in-right me-2"></i> Đăng nhập</h3>
        </div>
        <div class="card-body p-4 p-md-5">

                <form (ngSubmit)="onLogin()">
                    <div class="form-floating mb-3">
                        <input id="login-username" name="username" [(ngModel)]="username" autocomplete="username" class="form-control rounded-3" placeholder="Tài khoản" required />
                        <label for="login-username"><i class="bi bi-person me-1"></i> Tài khoản</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input id="login-password" type="password" name="password" [(ngModel)]="password" autocomplete="current-password" class="form-control rounded-3" placeholder="Mật khẩu" required />
                        <label for="login-password"><i class="bi bi-lock me-1"></i> Mật khẩu</label>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="rememberMe" />
                            <label class="form-check-label" for="rememberMe">Ghi nhớ đăng nhập</label>
                        </div>
                        <a href="javascript:void(0)" class="text-decoration-none small">Quên mật khẩu?</a>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg rounded-3 fw-bold shadow-sm">
                            Đăng nhập
                        </button>
                    </div>
                </form>
                
                <div class="mt-4 text-center">
                    <span class="text-muted">Chưa có tài khoản?</span> 
                    <a routerLink="/register" class="text-decoration-none fw-semibold">Đăng ký ngay</a>
                </div>
        </div>
    </div>
</div>
