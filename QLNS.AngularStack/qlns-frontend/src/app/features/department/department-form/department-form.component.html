<div class="dashboard">
    <div class="dashboard-header">
        <div>
            <h1 class="dashboard-title">{{ isEditMode ? 'Chỉnh sửa phòng ban' : 'Thêm mới phòng ban' }}</h1>
            <p class="dashboard-subtitle">{{ isEditMode ? 'Cập nhật thông tin phòng ban' : 'Tạo mới thông tin một phòng ban trên hệ thống' }}</p>
        </div>
    </div>

    <div class="row mt-3">
        <div class="col-md-6">
            <div class="chart-card">
                <form [formGroup]="departmentForm" (ngSubmit)="onSubmit()">
                    <div class="mb-3">
                        <label for="name" class="form-label fw-bold">Tên phòng ban</label>
                        <input type="text" id="name" formControlName="name" class="form-control" placeholder="Ví dụ: Phòng IT, Phòng Kinh doanh..." />
                        <span *ngIf="departmentForm.get('name')?.invalid && departmentForm.get('name')?.touched" class="text-danger mt-1 d-block">
                            Tên phòng ban không được để trống
                        </span>
                    </div>
                    
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary" [disabled]="departmentForm.invalid">
                            <i class="bi bi-save"></i> Lưu dữ liệu
                        </button>
                        <a routerLink="/departments" class="btn btn-light border">
                            <i class="bi bi-x-circle"></i> Hủy bỏ
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
