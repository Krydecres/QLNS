<div class="dashboard">
    <div class="dashboard-header d-flex justify-content-between align-items-center">
        <div>
            <h1 class="dashboard-title">Danh sách phòng ban</h1>
            <p class="dashboard-subtitle">Quản lý thông tin cơ cấu phòng ban trong công ty</p>
        </div>
        <div class="dashboard-actions">
            <a routerLink="/departments/create" class="btn btn-primary">
                <i class="bi bi-plus-lg"></i> Thêm phòng ban
            </a>
        </div>
    </div>

    <div class="chart-card mt-3">
        <table class="data-table table table-hover align-middle mb-0">
            <thead>
                <tr>
                    <th width="10%">Mã PB</th>
                    <th>Tên phòng ban</th>
                    <th width="20%" class="text-center">Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let item of departments">
                    <td>{{ item.id }}</td>
                    <td class="fw-bold">
                        <a [routerLink]="['/departments/details', item.id]">{{ item.name }}</a>
                    </td>
                    <td class="text-center">
                        <a [routerLink]="['/departments/edit', item.id]" class="btn btn-sm btn-outline-primary me-1" title="Chỉnh sửa"><i class="bi bi-pencil-square"></i> Sửa</a>
                        <button (click)="deleteDepartment(item.id, item.name)" class="btn btn-sm btn-outline-danger" title="Xóa"><i class="bi bi-trash"></i> Xóa</button>
                    </td>
                </tr>
                <tr *ngIf="departments.length === 0">
                    <td colspan="3" class="text-center text-muted py-4">Chưa có dữ liệu phòng ban.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
